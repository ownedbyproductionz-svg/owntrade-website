<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ownTrade — Coming Soon</title>
  <meta name="description" content="ownTrade — Automated trading bots. Precision enters the market. Coming 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #050a12;
      --bg-secondary: #0a1225;
      --green: #00e676;
      --green-dim: #00c853;
      --green-ghost: rgba(0, 230, 118, 0.06);
      --red: #ff1744;
      --red-dim: #d50000;
      --text-primary: #e8ece9;
      --text-muted: #4a6a5a;
      --text-dim: #2a3a30;
      --border: rgba(0, 230, 118, 0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: crosshair;
    }

    /* ── Grid overlay ── */
    .grid-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 230, 118, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 230, 118, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Multiple scan lines ── */
    .scanline {
      position: fixed;
      left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 230, 118, 0.1), transparent);
      z-index: 2;
      pointer-events: none;
    }
    .scanline:nth-child(1) { animation: scanDown 6s linear infinite; }
    .scanline:nth-child(2) { animation: scanDown 9s linear infinite 3s; opacity: 0.5; }
    .scanline:nth-child(3) { animation: scanUp 7s linear infinite 1.5s; opacity: 0.3; }

    @keyframes scanDown {
      0% { top: -2px; }
      100% { top: 100vh; }
    }
    @keyframes scanUp {
      0% { top: 100vh; }
      100% { top: -2px; }
    }

    /* ── Glow orbs - more of them, more movement ── */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb.g1 {
      width: 500px; height: 500px;
      background: rgba(0, 230, 118, 0.045);
      top: 15%; left: -10%;
      animation: orbit1 16s ease-in-out infinite;
    }
    .glow-orb.g2 {
      width: 350px; height: 350px;
      background: rgba(255, 23, 68, 0.035);
      bottom: 10%; right: -5%;
      animation: orbit2 20s ease-in-out infinite;
    }
    .glow-orb.g3 {
      width: 300px; height: 300px;
      background: rgba(0, 230, 118, 0.03);
      top: 60%; left: 50%;
      animation: orbit3 14s ease-in-out infinite;
    }

    @keyframes orbit1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(80px, -40px) scale(1.1); }
      50% { transform: translate(40px, 60px) scale(0.9); }
      75% { transform: translate(-30px, 20px) scale(1.05); }
    }
    @keyframes orbit2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-60px, -50px) scale(1.15); }
      66% { transform: translate(30px, 40px) scale(0.85); }
    }
    @keyframes orbit3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-100px, -60px); }
    }

    /* ── Corner brackets - animated ── */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 3;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(0, 230, 118, 0.2);
      animation: cornerPulse 3s ease-in-out infinite;
    }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tl::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner.tl::after { width: 1px; height: 100%; top: 0; left: 0; }

    .corner.tr { top: 24px; right: 24px; }
    .corner.tr::before { width: 100%; height: 1px; top: 0; right: 0; }
    .corner.tr::after { width: 1px; height: 100%; top: 0; right: 0; }

    .corner.bl { bottom: 24px; left: 24px; }
    .corner.bl::before { width: 100%; height: 1px; bottom: 0; left: 0; }
    .corner.bl::after { width: 1px; height: 100%; bottom: 0; left: 0; }

    .corner.br { bottom: 24px; right: 24px; }
    .corner.br::before { width: 100%; height: 1px; bottom: 0; right: 0; }
    .corner.br::after { width: 1px; height: 100%; bottom: 0; right: 0; }

    @keyframes cornerPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* ── Data streams - vertical scrolling numbers ── */
    .data-stream {
      position: fixed;
      top: 0;
      width: 20px;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.06;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--green);
      writing-mode: vertical-lr;
      line-height: 20px;
      animation: streamScroll 15s linear infinite;
    }
    .data-stream:nth-child(1) { left: 5%; animation-duration: 18s; }
    .data-stream:nth-child(2) { left: 15%; animation-duration: 22s; animation-delay: -5s; }
    .data-stream:nth-child(3) { right: 5%; animation-duration: 16s; animation-delay: -8s; }
    .data-stream:nth-child(4) { right: 15%; animation-duration: 20s; animation-delay: -3s; }

    @keyframes streamScroll {
      0% { transform: translateY(-50%); }
      100% { transform: translateY(0%); }
    }

    /* ── Floating ticker bar ── */
    .ticker-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 32px;
      background: rgba(0, 230, 118, 0.03);
      border-bottom: 1px solid rgba(0, 230, 118, 0.06);
      z-index: 20;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .ticker-track {
      display: flex;
      gap: 40px;
      animation: tickerScroll 30s linear infinite;
      white-space: nowrap;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .ticker-track span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ticker-track .up { color: var(--green); opacity: 0.5; }
    .ticker-track .down { color: var(--red); opacity: 0.5; }
    .ticker-track .dot { color: var(--text-dim); }

    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Main container ── */
    .main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
      margin-top: 32px;
    }

    /* ── Arrows icon - continuous float ── */
    .arrows {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
      animation: fadeInUp 1s ease-out 0.2s both;
    }
    .arrow-up {
      animation: arrowFloat 2.5s ease-in-out infinite;
    }
    .arrow-down {
      animation: arrowFloat 2.5s ease-in-out infinite 1.25s;
    }
    .arrow-up svg {
      filter: drop-shadow(0 0 18px rgba(0, 230, 118, 0.5));
    }
    .arrow-down svg {
      filter: drop-shadow(0 0 18px rgba(255, 23, 68, 0.5));
    }

    @keyframes arrowFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ── Logo text with glitch ── */
    .logo {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
      animation: fadeInUp 1s ease-out 0.4s both;
      position: relative;
    }
    .logo .highlight {
      color: var(--green);
      text-shadow: 0 0 30px rgba(0, 230, 118, 0.3);
      position: relative;
      display: inline-block;
    }

    /* Glitch on hover */
    .logo:hover .highlight {
      animation: glitch 0.4s ease-in-out;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      10% { transform: translate(-3px, 2px); text-shadow: 3px 0 var(--red), -3px 0 cyan; }
      20% { transform: translate(3px, -2px); text-shadow: -3px 0 var(--red), 3px 0 cyan; }
      30% { transform: translate(-2px, 1px); text-shadow: 2px 0 var(--red), -2px 0 cyan; }
      40% { transform: translate(2px, -1px); }
      50% { transform: translate(0); text-shadow: 0 0 30px rgba(0, 230, 118, 0.3); }
      100% { transform: translate(0); text-shadow: 0 0 30px rgba(0, 230, 118, 0.3); }
    }

    /* ── Subtitle with typing effect ── */
    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out 0.6s both;
      position: relative;
    }
    .subtitle .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--green);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Divider - animated width ── */
    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out 0.7s both, expandLine 2s ease-out 1.2s both;
    }
    @keyframes expandLine {
      from { width: 0; }
      to { width: 80px; }
    }

    /* ── Teaser text ── */
    .teaser {
      margin-bottom: 1rem;
      animation: fadeInUp 1s ease-out 0.8s both;
    }
    .teaser-line {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-muted);
      opacity: 0;
    }
    .teaser-line.accent {
      font-weight: 600;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
    }
    .teaser-line.visible {
      animation: typeReveal 0.8s ease-out forwards;
    }
    @keyframes typeReveal {
      0% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    /* ── Status indicator - pulsing dot ── */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.5rem 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      animation: fadeInUp 1s ease-out 0.9s both;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: statusPulse 2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.6);
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 10px rgba(0, 230, 118, 0.6); }
      50% { opacity: 0.4; transform: scale(0.7); box-shadow: 0 0 4px rgba(0, 230, 118, 0.3); }
    }

    /* ── Coming soon badge ── */
    .badge-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 2rem 0;
      animation: fadeInUp 1s ease-out 1s both;
    }
    .badge-line {
      width: 50px;
      height: 1px;
      background: rgba(0, 230, 118, 0.3);
      animation: lineExpand 1.5s ease-out 1.5s both;
    }
    @keyframes lineExpand {
      from { width: 0; opacity: 0; }
      to { width: 50px; opacity: 1; }
    }
    .badge {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      letter-spacing: 12px;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
      animation: badgePulse 4s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%, 100% { text-shadow: 0 0 20px rgba(0, 230, 118, 0.3); }
      50% { text-shadow: 0 0 40px rgba(0, 230, 118, 0.6), 0 0 80px rgba(0, 230, 118, 0.2); }
    }

    /* ── Tags - staggered entry ── */
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all 0.4s ease;
      opacity: 0;
      animation: tagPop 0.5s ease-out forwards;
    }
    .tag:nth-child(1) { animation-delay: 1.3s; }
    .tag:nth-child(2) { animation-delay: 1.5s; }
    .tag:nth-child(3) { animation-delay: 1.7s; }
    .tag:nth-child(4) { animation-delay: 1.9s; }

    @keyframes tagPop {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .tag:hover {
      border-color: rgba(0, 230, 118, 0.4);
      color: var(--green);
      background: var(--green-ghost);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.1);
    }

    /* ── Links section ── */
    .links {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeInUp 1s ease-out 2.1s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      padding: 14px 28px;
      border: 1px solid rgba(0, 230, 118, 0.12);
      border-radius: 6px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 200%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 230, 118, 0.06), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -200%; }
      100% { left: 200%; }
    }
    .link-btn:hover {
      border-color: rgba(0, 230, 118, 0.5);
      color: var(--green);
      box-shadow: 0 0 30px rgba(0, 230, 118, 0.12), inset 0 0 30px rgba(0, 230, 118, 0.03);
      transform: translateY(-3px);
    }
    .link-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .link-btn:hover svg {
      transform: scale(1.2);
    }

    .link-separator {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 24px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      animation: fadeInUp 1s ease-out 2.3s both;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Particles - more of them ── */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      background: var(--green);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: particleFloat linear infinite;
    }
    .particle:nth-child(1) { left: 8%; animation-duration: 14s; animation-delay: 0s; width: 3px; height: 3px; }
    .particle:nth-child(2) { left: 20%; animation-duration: 18s; animation-delay: 2s; }
    .particle:nth-child(3) { left: 35%; animation-duration: 12s; animation-delay: 5s; }
    .particle:nth-child(4) { left: 50%; animation-duration: 16s; animation-delay: 1s; width: 3px; height: 3px; }
    .particle:nth-child(5) { left: 65%; animation-duration: 20s; animation-delay: 4s; }
    .particle:nth-child(6) { left: 75%; animation-duration: 15s; animation-delay: 7s; }
    .particle:nth-child(7) { left: 88%; animation-duration: 17s; animation-delay: 3s; width: 3px; height: 3px; }
    .particle:nth-child(8) { left: 95%; animation-duration: 13s; animation-delay: 6s; }
    .particle.red { background: var(--red); }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      5% { opacity: 0.5; transform: scale(1); }
      95% { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-20vh) scale(0.5); }
    }

    /* ── Canvas chart ── */
    #chartCanvas {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 45%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.09;
      mask-image: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    /* ── Mouse trail canvas ── */
    #trailCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .links { flex-direction: column; gap: 12px; }
      .link-separator { display: none; }
      .tags { gap: 6px; }
      .tag { font-size: 0.55rem; padding: 5px 10px; }
      .badge { letter-spacing: 6px; }
      .data-stream { display: none; }
      .ticker-track { font-size: 9px; gap: 24px; }
    }
  </style>
</head>

      <div class="link-separator"></div>

      <a href="mailto:contact@owntrade.org" class="link-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>

      </a>

  </main>

  <div class="footer">© 2026 OWNTRADE</div>

  <script>
    // ── Typing effect ──
    const phrases = ['AUTOMATED TRADING BOTS', 'PRECISION ENTERS THE MARKET', '24/7 · LONG · SHORT', 'NO SLEEP · NO EMOTIONS'];
    let phraseIdx = 0, charIdx = 0, deleting = false;
    const typedEl = document.getElementById('typedText');

    function typeLoop() {
      const current = phrases[phraseIdx];
      if (!deleting) {
        typedEl.textContent = current.substring(0, charIdx + 1);
        charIdx++;
        if (charIdx === current.length) {
          setTimeout(() => { deleting = true; typeLoop(); }, 2500);
          return;
        }
        setTimeout(typeLoop, 80);
      } else {
        typedEl.textContent = current.substring(0, charIdx - 1);
        charIdx--;
        if (charIdx === 0) {
          deleting = false;
          phraseIdx = (phraseIdx + 1) % phrases.length;
          setTimeout(typeLoop, 500);
          return;
        }
        setTimeout(typeLoop, 40);
      }
    }
    setTimeout(typeLoop, 1500);

    // ── Teaser reveal ──
    setTimeout(() => document.getElementById('teaser1').classList.add('visible'), 2000);
    setTimeout(() => document.getElementById('teaser2').classList.add('visible'), 2800);

    // ── Ticker bar ──
    const tickerData = [
      { sym: 'BTC/USD', val: '+2.41%', up: true },
      { sym: 'ETH/USD', val: '-0.83%', up: false },
      { sym: 'SOL/USD', val: '+5.12%', up: true },
      { sym: 'AAPL', val: '+1.24%', up: true },
      { sym: 'TSLA', val: '-3.07%', up: false },
      { sym: 'EUR/USD', val: '+0.31%', up: true },
      { sym: 'NVDA', val: '+4.72%', up: true },
      { sym: 'AMZN', val: '-1.53%', up: false },
      { sym: 'XAU/USD', val: '+0.89%', up: true },
      { sym: 'GBP/USD', val: '-0.22%', up: false },
      { sym: 'MSFT', val: '+2.15%', up: true },
      { sym: 'META', val: '+3.44%', up: true },
    ];

    const tickerEl = document.getElementById('ticker');
    let tickerHTML = '';
    for (let i = 0; i < 3; i++) {
      tickerData.forEach(t => {
        tickerHTML += `<span class="${t.up ? 'up' : 'down'}">${t.sym} ${t.val}</span><span class="dot">·</span>`;
      });
    }
    tickerEl.innerHTML = tickerHTML;

    // ── Data streams ──
    function genStream() {
      let s = '';
      for (let i = 0; i < 200; i++) {
        s += (Math.random() > 0.5 ? '1' : '0') + ' ';
        if (Math.random() > 0.9) s += '  ';
      }
      return s;
    }
    document.getElementById('stream1').textContent = genStream();
    document.getElementById('stream2').textContent = genStream();
    document.getElementById('stream3').textContent = genStream();
    document.getElementById('stream4').textContent = genStream();

    // ── Chart canvas ──
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, points = [], candlesticks = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight * 0.45;
      trailCanvas.width = window.innerWidth;
      trailCanvas.height = window.innerHeight;
      genChartData();
    }

    function genChartData() {
      points = []; candlesticks = [];
      let y = height * 0.65;
      for (let i = 0; i <= 80; i++) {
        y += (Math.random() - 0.52) * 12;
        y = Math.max(height * 0.1, Math.min(height * 0.9, y));
        points.push({ x: (i / 80) * width, y });
      }
      for (let i = 0; i < 40; i++) {
        const x = (i / 40) * width + width * 0.01;
        const idx = Math.floor((i / 40) * 80);
        const baseY = points[Math.min(idx, points.length - 1)].y;
        const open = baseY + (Math.random() - 0.5) * 25;
        const close = baseY + (Math.random() - 0.5) * 25;
        const high = Math.min(open, close) - Math.random() * 15;
        const low = Math.max(open, close) + Math.random() * 15;
        candlesticks.push({ x, open, close, high, low, bullish: close < open, w: width / 40 * 0.45 });
      }
    }

    let offset = 0;
    function drawChart() {
      ctx.clearRect(0, 0, width, height);
      offset += 0.4;

      candlesticks.forEach((c, i) => {
        const shift = Math.sin((offset + i * 8) * 0.012) * 5;
        const color = c.bullish ? '#00e676' : '#ff1744';
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(c.x, c.high + shift);
        ctx.lineTo(c.x, c.low + shift);
        ctx.stroke();
        ctx.fillStyle = color;
        const top = Math.min(c.open, c.close) + shift;
        ctx.fillRect(c.x - c.w / 2, top, c.w, Math.max(Math.abs(c.close - c.open), 2));
      });

      ctx.beginPath();
      ctx.strokeStyle = '#00e676';
      ctx.lineWidth = 1.8;
      points.forEach((p, i) => {
        const shift = Math.sin((offset + i * 4) * 0.018) * 6;
        if (i === 0) ctx.moveTo(p.x, p.y + shift);
        else ctx.lineTo(p.x, p.y + shift);
      });
      ctx.stroke();

      ctx.lineTo(width, height);
      ctx.lineTo(0, height);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, 'rgba(0, 230, 118, 0.1)');
      grad.addColorStop(1, 'rgba(0, 230, 118, 0)');
      ctx.fillStyle = grad;
      ctx.fill();

      requestAnimationFrame(drawChart);
    }

    // ── Mouse trail ──
    const trailCanvas = document.getElementById('trailCanvas');
    const tCtx = trailCanvas.getContext('2d');
    let trails = [];

    document.addEventListener('mousemove', (e) => {
      trails.push({ x: e.clientX, y: e.clientY, life: 1 });
      if (trails.length > 50) trails.shift();
    });

    function drawTrail() {
      tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      trails = trails.filter(t => t.life > 0);
      trails.forEach((t, i) => {
        t.life -= 0.025;
        tCtx.beginPath();
        tCtx.arc(t.x, t.y, 2 * t.life, 0, Math.PI * 2);
        tCtx.fillStyle = `rgba(0, 230, 118, ${t.life * 0.3})`;
        tCtx.fill();
      });
      requestAnimationFrame(drawTrail);
    }

    window.addEventListener('resize', resize);
    resize();
    drawChart();
    drawTrail();
  </script>

</body>
